name = "bytesiren-worker"
main = "apps/worker/src/index.ts"
compatibility_date = "2026-06-16"

[vars]
APP_VERSION = "0.1.0-placeholder"
BUILD_PHASE = "phase-4a-claude-foundation"
CLAUDE_MODEL = ""
CLAUDE_WEB_SEARCH_TOOL_TYPE = ""
CLAUDE_DEFAULT_MAX_USES = "1"
CLAUDE_SECOND_SEARCH_MAX_USES = "2"
CLAUDE_PUBLIC_DAILY_ANALYSIS_LIMIT = ""
CLAUDE_ALLOWED_DOMAINS = ""
CLAUDE_BLOCKED_DOMAINS = ""

[[d1_databases]]
binding = "DB"
database_name = "bytesiren-placeholder"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "apps/worker/migrations"

[triggers]
crons = [
  "*/5 * * * *",
  "*/15 * * * *",
  "17 0 * * *"
]
