name: v0.2 Snapshot Refresh

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan only; do not deploy Worker or write remote D1"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      range_start:
        description: "Optional YYYY-MM-DD start day"
        required: false
        type: string
      range_end:
        description: "Optional YYYY-MM-DD end day"
        required: false
        type: string
      confirm_live:
        description: "Must be true when dry_run is false"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      trigger_source:
        description: "Safe trigger label, such as manual or cloudflare_cron"
        required: false
        default: "manual"
        type: string
      refresh_mode:
        description: "Safe refresh mode label"
        required: false
        default: "manual"
        type: string
      requested_at:
        description: "Optional requester timestamp"
        required: false
        type: string
      idempotency_key:
        description: "Optional external idempotency key"
        required: false
        type: string
concurrency:
  group: v02-snapshot-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh v0.2 deterministic snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check live confirmation
        if: ${{ inputs.dry_run == 'false' && inputs.confirm_live != 'true' }}
        run: |
          echo "Live refresh requires confirm_live=true."
          exit 1

      - name: Check required Cloudflare secret
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN is required for remote D1 and Worker deploy operations."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Print safe trigger metadata
        run: |
          echo "trigger_source=${{ inputs.trigger_source }}"
          echo "refresh_mode=${{ inputs.refresh_mode }}"
          echo "requested_at=${{ inputs.requested_at }}"
          echo "idempotency_key=${{ inputs.idempotency_key }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Targeted refresh tests
        run: |
          corepack pnpm --filter @bytesiren/worker exec node --test ../../scripts/v02-export-remote-import-sql.test.mjs ../../scripts/v02-apply-remote-import-sql.test.mjs ../../scripts/v02-snapshot-refresh.test.mjs

      - name: Run snapshot refresh
        shell: bash
        run: |
          set -euo pipefail
          args=(node scripts/v02-snapshot-refresh.mjs --rollback-on-fail)
          if [ "${{ inputs.range_start }}" != "" ]; then
            args+=(--range-start "${{ inputs.range_start }}")
          fi
          if [ "${{ inputs.range_end }}" != "" ]; then
            args+=(--range-end "${{ inputs.range_end }}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          else
            args+=(--manual-refresh --live --confirm-remote-v02-refresh)
          fi
          "${args[@]}"

      - name: Upload refresh reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v02-snapshot-refresh-reports
          path: |
            .tmp/v02-phase-d-*.json
            .tmp/v02-phase-d-*.md
            .tmp/v02-phase-d-refresh-*/**/*
            .tmp/v02-refresh-rollback/**/*
          if-no-files-found: ignore
